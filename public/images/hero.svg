<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#28214C"/>
      <stop offset="100%" style="stop-color:#3D3568"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6400;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FF6400;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="c2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8877ED;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8877ED;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)" rx="300"/>
  <circle cx="300" cy="300" r="260" fill="url(#c1)"/>
  <circle cx="300" cy="300" r="200" fill="url(#c2)"/>
  
  <!-- Hospital building icon -->
  <g transform="translate(300,240)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-70" y="-20" width="140" height="100" rx="4"/>
    <rect x="-50" y="10" width="30" height="35" rx="2"/>
    <rect x="20" y="10" width="30" height="35" rx="2"/>
    <rect x="-50" y="-60" width="100" height="50" rx="4"/>
    <line x1="0" y1="-60" x2="0" y2="-45"/>
    <line x1="-12" y1="-52" x2="12" y2="-52"/>
    <circle cx="-30" cy="30" r="4" fill="#FF6400" stroke="none"/>
    <circle cx="30" cy="30" r="4" fill="#FF6400" stroke="none"/>
  </g>
  
  <!-- Heartbeat line -->
  <polyline points="170,360 210,360 230,330 250,390 270,340 290,360 430,360" 
    fill="none" stroke="#FF6400" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cross symbol -->
  <g transform="translate(380,200)">
    <rect x="-15" y="-5" width="30" height="10" rx="2" fill="#FF6400"/>
    <rect x="-5" y="-15" width="10" height="30" rx="2" fill="#FF6400"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="150" cy="180" r="3" fill="#8877ED" opacity="0.5"/>
  <circle cx="450" cy="400" r="2" fill="#8877ED" opacity="0.4"/>
  <circle cx="160" cy="420" r="2.5" fill="#FF6400" opacity="0.3"/>
  <circle cx="440" cy="170" r="2" fill="#FF6400" opacity="0.4"/>
  
  <!-- Pulse ring -->
  <circle cx="300" cy="300" r="280" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <circle cx="300" cy="300" r="240" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
</svg>
